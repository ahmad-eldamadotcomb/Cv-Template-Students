<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
body{font-family:'Cairo';background:#0a0a0a;margin:0;padding:20px;color:#fff}
.container{max-width:900px;margin:auto;background:#121212;border-radius:20px;padding:3px;position:relative}
.container::before{content:'';position:absolute;top:-3px;left:-3px;right:-3px;bottom:-3px;background:linear-gradient(45deg,#00f5ff,#ff00ff);background-size:400%;border-radius:20px;z-index:-1;animation:glow 4s linear infinite}
@keyframes glow{0%{background-position:0% 50%}100%{background-position:400% 50%}}
.content{background:#121212;border-radius:17px;padding:30px}
h1{text-align:center;color:#00f5ff;text-shadow:0 0 10px #00f5ff}
input,textarea{width:100%;padding:12px;margin:8px 0;background:#1a1a1a;border:2px solid #333;border-radius:8px;color:#fff;font-family:'Cairo';font-size:16px}
input:focus,textarea:focus{border-color:#00f5ff;outline:none}
button{background:linear-gradient(45deg,#00f5ff,#ff00ff);border:none;padding:15px 30px;border-radius:10px;color:#000;font-weight:bold;font-size:18px;cursor:pointer;width:100%;margin-top:15px}
.cv-preview{background:#1a1a1a;padding:20px;border-radius:10px;margin-top:20px;border-right:4px solid #ff00ff}
@media print{body{background:#fff;color:#000} .no-print{display:none} .container::before{display:none}}
</style>
</head>
<body>
<div class="container"><div class="content">
<h1>انشئ سيرتك الذاتية</h1>
<div class="no-print">
<input type="text" id="name" placeholder="الاسم كامل">
<input type="text" id="job" placeholder="المسمى الوظيفي">
<input type="text" id="email" placeholder="الايميل">
<input type="text" id="phone" placeholder="رقم الجوال">
<textarea id="summary" placeholder="الملخص المهني" rows="3"></textarea>
<input type="text" id="exp_job" placeholder="اسم الوظيفة">
<input type="text" id="exp_company" placeholder="اسم الشركة والسنة">
<textarea id="exp_task" placeholder="المهام" rows="2"></textarea>
<input type="text" id="edu" placeholder="الشهادة والجامعة والسنة">
<input type="text" id="skill1" placeholder="المهارة 1">
<input type="text" id="skill2" placeholder="المهارة 2">
<button onclick="printCV()">🖨️ طباعة / حفظ PDF</button>
</div>
<div class="cv-preview" id="preview">
<h2 id="p_name">اسمك هنا</h2>
<p id="p_job" style="color:#ff00ff">المسمى الوظيفي</p>
<p id="p_contact">📧 | 📱</p>
<h3 style="color:#00f5ff">الملخص المهني</h3>
<p id="p_summary">...</p>
<h3 style="color:#00f5ff">الخبرات</h3>
<p><b id="p_exp_job">اسم الوظيفة</b><br><span id="p_exp_company">الشركة</span><br><span id="p_exp_task">المهام</span></p>
<h3 style="color:#00f5ff">التعليم</h3>
<p id="p_edu">الشهادة</p>
<h3 style="color:#00f5ff">المهارات</h3>
<p id="p_skill1">المهارة 1</p>
<p id="p_skill2">المهارة 2</p>
</div>
</div></div>
<script>
const inputs = document.querySelectorAll('input,textarea');
inputs.forEach(input=>{
input.addEventListener('input',()=>{
document.getElementById('p_name').innerText = document.getElementById('name').value || 'اسمك هنا';
document.getElementById('p_job').innerText = document.getElementById('job').value;
document.getElementById('p_contact').innerText = `📧 ${document.getElementById('email').value} | 📱 ${document.getElementById('phone').value}`;
document.getElementById('p_summary').innerText = document.getElementById('summary').value;
document.getElementById('p_exp_job').innerText = document.getElementById('exp_job').value;
document.getElementById('p_exp_company').innerText = document.getElementById('exp_company').value;
document.getElementById('p_exp_task').innerText = document.getElementById('exp_task').value;
document.getElementById('p_edu').innerText = document.getElementById('edu').value;
document.getElementById('p_skill1').innerText = document.getElementById('skill1').value;
document.getElementById('p_skill2').innerText = document.getElementById('skill2').value;
})
})
function printCV(){window.print();}
</script>
</body>
</html>
