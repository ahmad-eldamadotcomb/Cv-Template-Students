<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>انشاء السيرة الذاتية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
body{font-family:'Cairo';background:#0a0a0a;margin:0;padding:10px;display:flex;justify-content:center}
.container{max-width:600px;width:100%;background:#121212;border-radius:20px;padding:20px;color:#fff;margin-top:20px}
h1{text-align:center;color:#00f5ff;text-shadow:0 0 10px #00f5ff}
label{color:#ff00ff;display:block;margin-top:15px;font-weight:bold}
input{width:100%;padding:12px;margin-top:5px;border-radius:8px;border:2px solid #00f5ff;background:#1a1a1a;color:#fff;font-family:'Cairo';box-sizing:border-box}
input:focus{outline:none;border-color:#ff00ff;background:#222}
button{background:linear-gradient(45deg,#00ff88,#00f5ff);border:none;padding:15px;border-radius:10px;color:#000;font-weight:bold;font-size:18px;cursor:pointer;width:100%;margin-top:20px;font-family:'Cairo'}
</style>
</head>
<body>
<div class="container">
<h1>انشاء سيرة ذاتية</h1>
<form onsubmit="sendData(event)">
<label>الاسم</label>
<input type="text" id="name" placeholder="اكتب اسمك" required>
<label>الايميل</label>
<input type="email" id="email" placeholder="example@gmail.com" required>
<label>رقم الجوال</label>
<input type="tel" id="phone" placeholder="059xxxxxxx">
<label>المسمى الوظيفي</label>
<input type="text" id="job" placeholder="مصمم، مبرمج...">
<button type="submit">📤 ارسال السيرة</button>
</form>
</div>
<script>
function sendData(e){
e.preventDefault();
let name = document.getElementById('name').value;
let email = document.getElementById('email').value;
let phone = document.getElementById('phone').value;
let job = document.getElementById('job').value;
let subject = "شخص جديد انشأ سيرة ذاتية: " + name;
let body = "الاسم: " + name + "%0Aالايميل: " + email + "%0Aالجوال: " + phone + "%0Aالوظيفة: " + job;
window.location.href = "mailto:your-email@gmail.com?subject=" + subject + "&body=" + body;
setTimeout(function(){
    window.location.href = "cv.html";
}, 1000);
}
</script>
</body>
</html>
