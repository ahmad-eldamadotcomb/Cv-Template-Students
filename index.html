<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السيرة الذاتية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
body{font-family:'Cairo';background:#0a0a0a;margin:0;padding:20px;display:flex;justify-content:center}
.container{max-width:800px;width:100%;background:#121212;border-radius:20px;padding:3px;position:relative}
.container::before{content:'';position:absolute;top:-3px;left:-3px;right:-3px;bottom:-3px;background:linear-gradient(45deg,#00f5ff,#ff00ff);background-size:400%;border-radius:20px;z-index:-1;animation:glow 4s linear infinite}
@keyframes glow{0%{background-position:0% 50%}100%{background-position:400% 50%}}
.content{background:#121212;border-radius:17px;padding:30px;color:#fff}
h1{text-align:center;color:#00f5ff;text-shadow:0 0 10px #00f5ff}
h2{color:#ff00ff;text-shadow:0 0 8px #ff00ff;border-right:4px solid #ff00ff;padding-right:12px}
.item{background:#1a1a1a;padding:20px;border-radius:12px;margin-bottom:15px;border-right:3px solid #00f5ff;min-height:60px}
[contenteditable="true"]:focus{background:#222;border-right:3px solid #ff00ff;outline:none}
.upload-box{background:#1a1a1a;padding:15px;border-radius:12px;border:2px dashed #00f5ff;text-align:center;margin-bottom:15px}
.upload-box input{display:none}
.upload-label{cursor:pointer;color:#00f5ff;font-weight:bold}
.cert-img{max-width:100%;border-radius:8px;margin-top:10px;border:2px solid #ff00ff}
.btn{background:linear-gradient(45deg,#00f5ff,#ff00ff);border:none;padding:15px;border-radius:10px;color:#000;font-weight:bold;font-size:18px;cursor:pointer;width:100%;margin-top:10px;font-family:'Cairo'}
.save-btn{background:linear-gradient(45deg,#00ff88,#00f5ff)}
.owner-btn{background:linear-gradient(45deg,#ff0088,#ff00ff);display:none}
.locked{pointer-events:none;opacity:0.6}
#msg{color:#00ff88;text-align:center;margin-top:10px;font-weight:bold}
.contact-box{background:#1a1a1a;padding:12px;border-radius:10px;text-align:center;color:#00f5ff;font-weight:bold}
.placeholder{color:#666}
</style>
</head>
<body>
<div class="container"><div class="content">
<h1 contenteditable="true" id="name" class="placeholder">اكتب اسمك هنا</h1>
<p contenteditable="true" id="job" style="text-align:center;color:#ff00ff" class="placeholder">المسمى الوظيفي</p>
<div class="contact-box">
📧 <span contenteditable="true" id="email" class="placeholder">ايميلك@gmail.com</span> | 📱 <span contenteditable="true" id="phone" class="placeholder">رقمك</span> | 📍 <span contenteditable="true" id="location" class="placeholder">مكانك</span>
</div>
<h2>الملخص المهني</h2>
<div class="item" contenteditable="true" id="summary" class="placeholder">اكتب عن نفسك هنا</div>
<h2>الخبرات</h2>
<div class="item" contenteditable="true" id="exp" class="placeholder"><b>اسم الوظيفة</b><br>اسم الشركة | 2024<br>المهام</div>
<h2>التعليم</h2>
<div class="item" contenteditable="true" id="edu" class="placeholder"><b>اسم الشهادة</b><br>اسم الجامعة | 2022-2026</div>
<h2>المهارات</h2>
<div class="item" contenteditable="true" id="skill1" class="placeholder">المهارة 1</div>
<div class="item" contenteditable="true" id="skill2" class="placeholder">المهارة 2</div>
<div class="item" contenteditable="true" id="skill3" class="placeholder">المهارة 3</div>
<h2>المشاريع</h2>
<div class="item" contenteditable="true" id="project" class="placeholder"><b>اسم المشروع</b><br>وصف المشروع</div>
<h2>الشهادات المرفقة</h2>
<div class="upload-box">
<input type="file" id="certUpload" accept="image/*">
<label for="certUpload" class="upload-label">📎 اضغط لارفاق صورة الشهادة</label>
</div>
<div id="certPreview"></div>
<button class="btn save-btn" onclick="saveData()">💾 حفظ البيانات</button>
<button class="btn" onclick="window.print()">🖨️ حفظ كـ PDF</button>
<button class="btn owner-btn" id="ownerBtn" onclick="unlockAll()">🔓 انا صاحب الموقع - فك القفل</button>
<div id="msg"></div>
</div></div>
<script>
const OWNER_EMAIL = "your-email@gmail.com";
document.querySelectorAll('[contenteditable="true"]').forEach(el => {
el.addEventListener('focus', function(){
if(this.classList.contains('placeholder')){
this.innerText = '';
this.classList.remove('placeholder');
}
});
});
window.onload = function(){
let saved = localStorage.getItem("cvData");
let userEmail = localStorage.getItem("userEmail");
if(saved){
let data = JSON.parse(saved);
for(let key in data){
if(document.getElementById(key)) document.getElementById(key).innerHTML = data[key];
}
if(document.getElementById('certPreview') && data.cert) document.getElementById('certPreview').innerHTML = data.cert;
document.querySelectorAll('.placeholder').forEach(el => el.classList.remove('placeholder'));
}
if(userEmail && userEmail!== OWNER_EMAIL){
document.querySelector('.content').classList.add('locked');
document.getElementById('msg').innerText = "⚠️ انت سجلت قبل كده بالايميل: " + userEmail;
}
if(userEmail === OWNER_EMAIL){
document.getElementById('ownerBtn').style.display = 'block';
}
}
function saveData(){
let name = document.getElementById('name').innerText;
let email = document.getElementById('email').innerText.trim();
let phone = document.getElementById('phone').innerText.trim();
let job = document.getElementById('job').innerText;
let data = {};
let ids = ["name","job","email","phone","location","summary","exp","edu","skill1","skill2","skill3","project"];
ids.forEach(id => data[id] = document.getElementById(id).innerHTML);
data.cert = document.getElementById('certPreview').innerHTML;
localStorage.setItem("cvData", JSON.stringify(data));
localStorage.setItem("userEmail", email);
document.getElementById('msg').innerText = "✅ تم الحفظ! سجلنا: " + name;
let subject = "🔔 شخص جديد سجل في موقع السيرة: " + name;
let body = "الاسم: " + name + "%0A";
body += "الايميل: " + email + "%0A";
body += "الجوال: " + phone + "%0A";
body += "الوظيفة: " + job + "%0A%0A";
body += "تم التسجيل الان من الموقع";
window.location.href = "mailto:" + OWNER_EMAIL + "?subject=" + subject + "&body=" + body;
}
document.getElementById('certUpload').addEventListener('change', function(e){
const file = e.target.files[0];
if(file){
const reader = new FileReader();
reader.onload = function(event){
document.getElementById('certPreview').innerHTML = `<img src="${event.target.result}" class="cert-img">`;
}
reader.readAsDataURL(file);
}
});
function unlockAll(){
localStorage.removeItem("userEmail");
document.querySelector('.content').classList.remove('locked');
document.getElementById('msg').innerText = "🔓 تم فك القفل. تقدر تعدل براحتك";
}
</script>
</body>
</html>
